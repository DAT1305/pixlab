name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            command: npm run build:windows
            artifact: pixlab-desktop-windows-x64
            path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - arch: x86
            command: npm run build:windows:x86
            artifact: pixlab-desktop-windows-x86
            path: |
              src-tauri/target/i686-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust x86 target
        if: matrix.arch == 'x86'
        run: rustup target add i686-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build release
        run: ${{ matrix.command }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  build-macos:
    name: Build macOS
    runs-on: macos-14
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build release
        run: npm run build:mac

      - name: Repackage macOS app with ad-hoc signature
        run: npm run package:mac-ad-hoc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixlab-desktop-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/') && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pixlab-desktop-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          generate_release_notes: true
